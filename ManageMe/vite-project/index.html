<!DOCTYPE html>
<html lang="pl" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ManageMe - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        .story-card { cursor: pointer; transition: all 0.2s ease-in-out; }
        .story-card:hover { transform: translateY(-3px); box-shadow: 0 .5rem 1rem rgba(0,0,0,.15)!important; }
        .active-project { border: 2px solid #0d6efd !important; background-color: var(--bs-tertiary-bg); }
        .column-todo { border-top: 5px solid #6c757d; }
        .column-doing { border-top: 5px solid #0dcaf0; }
        .column-done { border-top: 5px solid #198754; }
        .board-column { min-height: 400px; background-color: var(--bs-tertiary-bg); border-radius: 8px; padding: 10px; }
    </style>
</head>
<body class="bg-body-tertiary">

<nav class="navbar navbar-expand-lg border-bottom sticky-top bg-body">
    <div class="container">
        <a class="navbar-brand fw-bold" href="#">🚀 ManageMe</a>
        
        <div class="d-flex align-items-center">
            <div id="user-info" class="me-3 d-none d-sm-block"></div>
            
            <div class="dropdown me-3">
                <button class="btn btn-outline-secondary btn-sm position-relative" id="notificationBtn">
                    <i class="bi bi-bell"></i>
                    <span id="notificationBadge" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger d-none">
                        0
                    </span>
                </button>
            </div>

            <button id="themeToggle" class="btn btn-outline-secondary btn-sm">
                <i id="themeIcon" class="bi bi-moon-stars"></i>
            </button>
        </div>
    </div>
</nav>

<!-- Notification Toast Container -->
<div class="toast-container position-fixed bottom-0 end-0 p-3" id="toastContainer"></div>

<!-- Notification List Modal -->
<div class="modal fade" id="notificationsModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
        <div class="modal-content border-0 shadow">
            <div class="modal-header bg-dark text-white">
                <h5 class="modal-title"><i class="bi bi-bell me-2"></i>Powiadomienia</h5>
                <div>
                    <button id="markAllReadBtn" class="btn btn-sm btn-outline-light me-2">Oznacz wszystkie jako przeczytane</button>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
            </div>
            <div class="modal-body p-0">
                <div id="notificationList" class="list-group list-group-flush">
                    <!-- Notifications will be loaded here -->
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Notification Detail Modal -->
<div class="modal fade" id="notificationDetailModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content border-0 shadow">
            <div class="modal-header" id="notificationDetailHeader">
                <h5 class="modal-title" id="notificationDetailTitle"></h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <p id="notificationDetailDate" class="small text-muted mb-2"></p>
                <div id="notificationDetailMessage"></div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Zamknij</button>
            </div>
        </div>
    </div>
</div>

<div class="container mt-4">
    <div class="row">
        <div class="col-lg-3 col-md-4">
            <div class="card shadow-sm mb-4 border-0">
                <div class="card-body">
                    <h5 class="card-title mb-3"><i class="bi bi-plus-circle me-2"></i>Nowy Projekt</h5>
                    <div class="mb-3">
                        <input id="name" class="form-control" placeholder="Nazwa projektu">
                    </div>
                    <div class="mb-3">
                        <textarea id="description" class="form-control" placeholder="Opis" rows="2"></textarea>
                    </div>
                    <button id="addBtn" class="btn btn-primary w-100">Dodaj projekt</button>
                </div>
            </div>
            
            <h6 class="text-uppercase text-muted fw-bold mb-3 px-2">Twoje Projekty</h6>
            <div id="projects" class="list-group shadow-sm border-0 mb-4">
            </div>
        </div>

        <div class="col-lg-9 col-md-8">
            <div id="story-section" style="display:none">
                <div class="card shadow-sm mb-4 border-0">
                    <div class="card-body">
                        <h5 class="mb-3"><i class="bi bi-kanban me-2"></i>Nowa Historyjka</h5>
                        <div class="row g-3">
                            <div class="col-md-6">
                                <input id="storyName" class="form-control" placeholder="Nazwa zadania">
                            </div>
                            <div class="col-md-3">
                                <select id="storyPriority" class="form-select">
                                    <option value="low">Niski</option>
                                    <option value="medium" selected>Średni</option>
                                    <option value="high">Wysoki</option>
                                </select>
                            </div>
                            <div class="col-md-3">
                                <button id="addStoryBtn" class="btn btn-success w-100">Dodaj Story</button>
                            </div>
                            <div class="col-12">
                                <textarea id="storyDesc" class="form-control" placeholder="Krótki opis zadania" rows="1"></textarea>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Tablica Kanban -->
                <div class="row g-3 mb-4">
                    <div class="col-md-4">
                        <div class="board-column border-top border-4 border-secondary">
                            <h6 class="text-uppercase fw-bold text-secondary mb-3"><i class="bi bi-list-ul me-2"></i>DO ZROBIENIA</h6>
                            <div id="col-todo"></div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="board-column border-top border-4 border-info">
                            <h6 class="text-uppercase fw-bold text-info mb-3"><i class="bi bi-play-circle me-2"></i>W TOKU</h6>
                            <div id="col-doing"></div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="board-column border-top border-4 border-success">
                            <h6 class="text-uppercase fw-bold text-success mb-3"><i class="bi bi-check-circle me-2"></i>GOTOWE</h6>
                            <div id="col-done"></div>
                        </div>
                    </div>
                </div>

                <!-- Task Sekcja -->
                <div class="card shadow-sm mb-4 border-0">
                    <div class="card-body">
                        <h5 class="mb-3"><i class="bi bi-task me-2"></i>Nowy Task</h5>
                        <div class="row g-3">
                            <div class="col-md-4">
                                <input id="taskName" class="form-control" placeholder="Nazwa taska">
                            </div>
                            <div class="col-md-3">
                                <select id="taskPriority" class="form-select">
                                    <option value="low">Niski</option>
                                    <option value="medium" selected>Średni</option>
                                    <option value="high">Wysoki</option>
                                </select>
                            </div>
                            <div class="col-md-2">
                                <input id="taskTime" type="number" class="form-control" placeholder="Godziny">
                            </div>
                            <div class="col-md-3">
                                <select id="taskUser" class="form-select">
                                    <option value="">Użytkownik</option>
                                </select>
                            </div>
                            <div class="col-12 d-flex gap-2">
                                <input id="taskDesc" class="form-control" placeholder="Opis">
                                <button id="addTaskBtn" class="btn btn-primary text-nowrap">Dodaj Task</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div id="no-project-alert" class="alert alert-info border-0 shadow-sm d-flex align-items-center p-4">
                <i class="bi bi-info-circle-fill fs-3 me-3"></i>
                <div>
                    <h5 class="alert-heading mb-1">Witaj w ManageMe!</h5>
                    Wybierz projekt z listy po lewej lub utwórz nowy, aby zarządzać zadaniami.
                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="taskModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content border-0 shadow">
      <div class="modal-header bg-primary text-white">
        <h5 class="modal-title"><i class="bi bi-info-circle me-2"></i>Szczegóły Taska</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body" id="taskDetails">
      </div>
      <div class="modal-footer bg-light">
        <button id="finishTaskBtn" class="btn btn-success"><i class="bi bi-check2-all me-1"></i>Zakończ Task</button>
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Zamknij</button>
      </div>
    </div>
  </div>
</div>

<script type="module" src="/src/main.ts"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
